<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promo</title>
    <link rel="stylesheet" href="../../shared/base.css" />
    <link rel="stylesheet" href="../../shared/cinematic.css" />
    <link rel="stylesheet" href="../../shared/subtitles.css" />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  </head>
  <body>
    <div class="stage cinema" data-grade="promo">

      <!-- Cinema bg: ambient gradient -->
      <div class="cinema-bg depth-3"></div>

      <!-- Cinema mid: chromatic glow blob pair (parallax depth-2) -->
      <div class="cinema-mid depth-2">
        <div class="glow-blob glow-blob--teal" id="glow-blob-teal"></div>
        <div class="glow-blob glow-blob--amber" id="glow-blob-amber"></div>
      </div>

      <!-- Scenes injected by animation.js -->
      <div id="scenes" class="cinema-fg depth-1"></div>

      <!-- Cinema grade stack -->
      <div class="cinema-grade"></div>
      <div class="cinema-vignette"></div>
      <div class="cinema-grain"></div>
      <div class="cinema-flash"></div>

      <!-- Subtitle layer -->
      <div class="subtitle-layer">
        <div class="subtitle-text" id="subtitle-text"></div>
      </div>

    </div>

    <div class="runner-loading" id="runner-loading">Loading...</div>

    <script type="module">
      import { runTemplate } from "../../shared/runner.js";
      import { buildTimeline } from "./animation.js";
      runTemplate(buildTimeline);
    </script>
  </body>
</html>
