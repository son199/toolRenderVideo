<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hyperframes — Dev Preview</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      header { padding: 12px 20px; background: #18181b; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
      header h1 { font-size: 14px; font-weight: 600; margin-right: 16px; color: #a78bfa; }
      header label { font-size: 12px; color: #71717a; display: flex; flex-direction: column; gap: 4px; }
      header select, header input, header button { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
      header button { background: #7c3aed; color: #fff; border-color: #7c3aed; cursor: pointer; }
      header button:hover { background: #6d28d9; }
      header .status { margin-left: auto; font-size: 12px; color: #a1a1aa; }
      main { position: relative; background: #000; overflow: hidden; }
      .frame { position: absolute; top: 50%; left: 50%; transform-origin: center; background: #000; }
      .frame[data-aspect="9:16"] { width: 540px; height: 960px; transform: translate(-50%, -50%); }
      .frame[data-aspect="16:9"] { width: 960px; height: 540px; transform: translate(-50%, -50%); }
      iframe { width: 100%; height: 100%; border: 0; display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1>Hyperframes Dev</h1>
      <label>Template
        <select id="template">
          <option value="news">news</option>
          <option value="promo">promo</option>
          <option value="motivational">motivational</option>
        </select>
      </label>
      <label>Tỉ lệ
        <select id="aspect">
          <option value="9:16">9:16</option>
          <option value="16:9">16:9</option>
        </select>
      </label>
      <label>Nguồn
        <select id="source">
          <option value="fixture">Fixture của template</option>
          <option value="project">Project có sẵn (backend)</option>
        </select>
      </label>
      <label id="project-label" style="display:none">Project ID
        <input type="text" id="project-id" placeholder="uuid..." size="36" />
      </label>
      <button id="reload">Reload</button>
      <div class="status" id="status">Idle</div>
    </header>
    <main>
      <div class="frame" id="frame" data-aspect="9:16">
        <iframe id="preview" src=""></iframe>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const templateSel = $("template");
      const aspectSel = $("aspect");
      const sourceSel = $("source");
      const projectIdInput = $("project-id");
      const projectLabel = $("project-label");
      const frame = $("frame");
      const iframe = $("preview");
      const status = $("status");
      const reloadBtn = $("reload");

      function syncProjectVisibility() {
        projectLabel.style.display = sourceSel.value === "project" ? "" : "none";
      }
      sourceSel.addEventListener("change", syncProjectVisibility);
      syncProjectVisibility();

      async function loadPreview() {
        const tpl = templateSel.value;
        const aspect = aspectSel.value;
        const src = sourceSel.value;

        frame.dataset.aspect = aspect;
        status.textContent = "Loading...";

        let storyboard = null;
        let audioMeta = null;

        if (src === "project") {
          const pid = projectIdInput.value.trim();
          if (!pid) {
            status.textContent = "Nhập project ID.";
            return;
          }
          try {
            const res = await fetch(`/api/projects/${pid}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const p = await res.json();
            storyboard = p.storyboard;
            if (!storyboard) {
              status.textContent = "Project chưa có storyboard.";
              return;
            }
            // Override template/aspect to match the request
            storyboard = { ...storyboard, template: tpl, aspect_ratio: aspect };
            audioMeta = (p.scenes || []).map((s) => ({
              scene_id: s.id,
              audio_url: s.audio_path ? toStaticUrl(s.audio_path) : null,
              duration_sec: s.duration_sec,
              word_timings: s.word_timings || null,
            }));
          } catch (e) {
            status.textContent = `Lỗi tải project: ${e.message}`;
            return;
          }
        }

        // Build the iframe URL pointing at the template; pass data via postMessage
        // after iframe loads, OR inject via a query-string fallback.
        iframe.src = `/static/hyperframes/templates/${tpl}/index.html?_t=${Date.now()}`;

        await new Promise((resolve) => (iframe.onload = resolve));

        // Inject data into iframe window then trigger a re-run by reloading internals.
        // Simplest: set the globals on iframe.contentWindow and reload the iframe a
        // second time — the runner reads window.__STORYBOARD__ when it starts.
        // To avoid double-load complexity, we use sessionStorage instead: write the
        // override, the iframe's runner.js will read it via a tiny patch (see below).
        if (storyboard) {
          try {
            iframe.contentWindow.sessionStorage.setItem(
              "__HYPERFRAMES_OVERRIDE__",
              JSON.stringify({ storyboard, audioMeta }),
            );
            iframe.contentWindow.location.reload();
            await new Promise((resolve) => (iframe.onload = resolve));
          } catch (e) {
            console.warn("Could not inject override into iframe:", e);
          }
        }

        status.textContent = `Loaded ${tpl} (${aspect}) — ${
          storyboard ? "project " + (projectIdInput.value || "").slice(0, 8) : "fixture"
        }`;
      }

      function toStaticUrl(absPath) {
        // Backend stores absolute filesystem paths like
        // E:\toolVideoShort\storage\audio\<pid>\scene_00.mp3 — convert to /static/storage/...
        const ix = absPath.replace(/\\/g, "/").indexOf("/storage/");
        if (ix === -1) return absPath;
        return "/static" + absPath.replace(/\\/g, "/").slice(ix);
      }

      reloadBtn.addEventListener("click", loadPreview);
      [templateSel, aspectSel].forEach((el) => el.addEventListener("change", loadPreview));

      loadPreview();
    </script>
  </body>
</html>
